<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0b10"/>
      <stop offset="100%" stop-color="#1e1e2e"/>
    </linearGradient>
    <radialGradient id="vinyl" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#313244"/>
      <stop offset="80%" stop-color="#181825"/>
      <stop offset="100%" stop-color="#1e1e2e"/>
    </radialGradient>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="22" ry="22" fill="url(#bg)"/>
  <text x="64" y="46" font-family="'Ubuntu Sans', Ubuntu, Arial, sans-serif"
        font-size="32" font-weight="bold" fill="#89b4fa" text-anchor="middle">ndisc</text>
  <!-- vinyl record -->
  <circle cx="64" cy="78" r="32" fill="url(#vinyl)" stroke="#a6e3a1"
          stroke-width="0.5" opacity="0.9"/>
  <!-- groove rings -->
  <g fill="none" stroke="#cdd6f4" stroke-width="0.4" opacity="0.35">
    <circle cx="64" cy="78" r="28"/>
    <circle cx="64" cy="78" r="24"/>
    <circle cx="64" cy="78" r="20"/>
    <circle cx="64" cy="78" r="16"/>
  </g>
  <!-- record label -->
  <circle cx="64" cy="78" r="9" fill="#89b4fa"/>
  <!-- spindle hole -->
  <circle cx="64" cy="78" r="1.6" fill="#1e1e2e"/>
  <!-- highlight -->
  <ellipse cx="54" cy="68" rx="8" ry="3" fill="#cdd6f4" opacity="0.12"/>
</svg>
